version: '3.8'

services:
  # ═════════════════════════════════════════════════════════════════════════
  # PostgreSQL Database
  # ═════════════════════════════════════════════════════════════════════════
  db:
    image: postgres:15-alpine
    container_name: django_login_db
    environment:
      POSTGRES_DB: ${DB_NAME:-django_login_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - django_network

  # ═════════════════════════════════════════════════════════════════════════
  # Redis Cache & Session Store
  # ═════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: django_login_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - django_network

  # ═════════════════════════════════════════════════════════════════════════
  # Django Application
  # ═════════════════════════════════════════════════════════════════════════
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_login_web
    command: sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 config.wsgi:application
      "
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-django_login_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/accounts/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - django_network

  # ═════════════════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy (Optional)
  # ═════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: django_login_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - django_network

# ═════════════════════════════════════════════════════════════════════════════
# Volumes for persistent data
# ═════════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:

# ═════════════════════════════════════════════════════════════════════════════
# Network
# ═════════════════════════════════════════════════════════════════════════════
networks:
  django_network:
    driver: bridge
